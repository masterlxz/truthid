name: Build

# Dispara apenas quando uma tag de versão é criada (ex: v0.1.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: '*.deb'
          - os: windows-latest
            artifact: '*.msi'
          - os: macos-latest
            artifact: '*.dmg'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Dependências nativas do Linux que o Tauri e o keyring precisam
      - name: Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            patchelf

      - name: npm install
        working-directory: desktop
        run: npm ci --legacy-peer-deps

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: TruthID ${{ github.ref_name }}
          releaseDraft: true
          includeDebug: false

