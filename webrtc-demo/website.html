<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TruthID — Website (Auth Demo)</title>
  <style>
    body { font-family: monospace; max-width: 650px; margin: 40px auto; padding: 0 20px; }
    button { padding: 8px 16px; margin: 4px; cursor: pointer; }
    #log { background: #111; color: #0f0; padding: 16px; height: 300px; overflow-y: auto; white-space: pre-wrap; }
    #qr-section { display: none; background: #f9f9f9; border: 1px solid #ddd; padding: 16px; margin: 12px 0; border-radius: 8px; text-align: center; }
    #qr-container canvas { display: block; margin: 12px auto; }
    #challenge-section { display: none; }
  </style>
  <!-- QR code generator -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- ethers.js para verificar assinatura secp256k1 (mesma curva do Ethereum) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body>
  <h2>TruthID — Website (Auth Demo)</h2>

  <button id="btn-start">1. Criar sala e gerar QR</button>

  <div id="qr-section">
    <b>Escaneie com o app TruthID no celular:</b>
    <div id="qr-container"></div>
    <small id="room-id-label" style="color:#555"></small>
    <p><em>Aguardando o celular conectar...</em></p>
  </div>

  <div id="challenge-section">
    <hr>
    <button id="btn-challenge">2. Enviar challenge para o celular</button>
  </div>

  <hr>
  <div id="log"></div>

  <script>
    const SIGNALING_WS = 'ws://localhost:8000';
    const SIGNALING_API = 'http://localhost:8000';
    const CHALLENGE_TTL_MS = 30_000;

    // Set de nonces já usados — protege contra replay attack
    const usedNonces = new Set();

    let ws = null;
    let lastChallenge = null;

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    }

    // ── Passo 1: criar sala e mostrar QR ─────────────────────────────────────

    document.getElementById('btn-start').addEventListener('click', async () => {
      document.getElementById('btn-start').disabled = true;
      document.getElementById('qr-container').innerHTML = '';

      // Cria sala no servidor de sinalização
      let room_id;
      try {
        const res = await fetch(`${SIGNALING_API}/rooms`, { method: 'POST' });
        ({ room_id } = await res.json());
      } catch (err) {
        log(`ERRO ao criar sala: ${err.message}`);
        log('O servidor de sinalização está rodando em localhost:8000?');
        document.getElementById('btn-start').disabled = false;
        return;
      }
      log(`Sala criada: ${room_id}`);

      // Payload que o QR vai conter — exatamente o que o app mobile espera
      const qrPayload = JSON.stringify({
        action: 'truthid-auth',
        signalingUrl: SIGNALING_WS,
        roomId: room_id,
      });

      // Mostra o QR
      document.getElementById('qr-section').style.display = 'block';
      document.getElementById('room-id-label').textContent = `Sala: ${room_id}`;
      new QRCode(document.getElementById('qr-container'), {
        text: qrPayload,
        width: 220,
        height: 220,
      });

      // Conecta ao WebSocket da sala para receber mensagens do mobile
      ws = new WebSocket(`${SIGNALING_WS}/rooms/${room_id}`);
      ws.onopen = () => log('Conectado à sinalização — aguardando o celular...');
      ws.onmessage = (evt) => handleMessage(JSON.parse(evt.data));
      ws.onerror = () => log('Erro na conexão WebSocket.');
    });

    // ── Passo 2: receber mensagens do mobile ─────────────────────────────────

    function handleMessage(msg) {
      if (msg.type === 'ready') {
        // Mobile entrou na sala — libera o botão de enviar challenge
        log('Celular conectado! Pronto para enviar o challenge.');
        document.getElementById('challenge-section').style.display = 'block';
      } else if (msg.type === 'auth-response') {
        handleAuthResponse(msg);
      }
    }

    // ── Passo 3: enviar challenge ─────────────────────────────────────────────

    document.getElementById('btn-challenge').addEventListener('click', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('WebSocket não está aberto.');
        return;
      }

      const challenge = {
        type: 'challenge',
        nonce: crypto.randomUUID(),
        issuedAt: Date.now(),
        origin: location.host || 'localhost',
      };

      lastChallenge = challenge;
      ws.send(JSON.stringify(challenge));

      log(`Challenge enviado:`);
      log(`  nonce:    ${challenge.nonce}`);
      log(`  issuedAt: ${new Date(challenge.issuedAt).toLocaleTimeString()}`);
      log(`  origin:   ${challenge.origin}`);
    });

    // ── Passo 4: verificar a resposta do mobile ───────────────────────────────

    async function handleAuthResponse(msg) {
      if (!msg.approved) {
        log('*** LOGIN RECUSADO pelo dispositivo ***');
        return;
      }

      log('Resposta recebida — verificando...');

      // Camada 1: TTL — desafio não pode ter mais de 30 segundos
      const age = Date.now() - lastChallenge.issuedAt;
      if (age > CHALLENGE_TTL_MS) {
        log(`*** REJEITADO: challenge expirado (${(age / 1000).toFixed(1)}s > 30s) ***`);
        return;
      }
      log(`  TTL ok (${(age / 1000).toFixed(1)}s)`);

      // Camada 2: nonce único — protege contra replay attack
      if (usedNonces.has(msg.nonce)) {
        log('*** REJEITADO: nonce já utilizado (replay attack) ***');
        return;
      }
      usedNonces.add(msg.nonce);
      log('  Nonce ok');

      // Camada 3: verificar assinatura secp256k1
      // O app Flutter usa signPersonalMessageToUint8List() que adiciona o prefixo:
      //   "\x19Ethereum Signed Message:\n{len}"
      // ethers.verifyMessage() adiciona o mesmo prefixo antes de verificar,
      // então eles são compatíveis.
      log('Verificando assinatura secp256k1...');
      try {
        const challengeJson = JSON.stringify(lastChallenge);
        const recoveredAddress = ethers.utils.verifyMessage(challengeJson, msg.signature);

        if (recoveredAddress.toLowerCase() === msg.deviceAddress.toLowerCase()) {
          log('*** ASSINATURA VÁLIDA — LOGIN APROVADO! ***');
          log(`  device: ${msg.deviceAddress}`);
          log('  (prod: verificar no DeviceRegistry se o device está ativo na blockchain)');
        } else {
          log('*** ASSINATURA INVÁLIDA — endereço não bate ***');
          log(`  esperado:   ${msg.deviceAddress}`);
          log(`  recuperado: ${recoveredAddress}`);
        }
      } catch (err) {
        log(`*** ERRO na verificação: ${err.message} ***`);
      }
    }
  </script>
</body>
</html>
