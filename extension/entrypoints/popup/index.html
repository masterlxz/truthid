<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TruthID Vault</title>
    <link rel="stylesheet" href="../../src/ui/theme.css" />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <h1><img src="/icon/32.png" alt="" /> TruthID Vault</h1>

    <section id="qr-section">
      <div class="card">
        <p class="muted">Scan this QR code from the TruthID Mobile app.</p>
        <canvas id="qr-canvas"></canvas>
        <p id="status-text"></p>
        <button id="find-button">I scanned it — look for my phone</button>
        <div class="manual-row">
          <input id="manual-ip" type="text" placeholder="Phone IP (e.g. 192.168.1.42)" />
          <button id="manual-connect">Connect</button>
        </div>
      </div>
      <div class="secondary-action">
        <button id="new-session">Generate a new QR code</button>
      </div>
    </section>

    <section id="entries-section" hidden>
      <div id="entries-list"></div>
      <div class="secondary-action">
        <button id="new-session-2">Start a new session</button>
      </div>
    </section>

    <section id="pending-edits-section" hidden>
      <div class="card">
        <span class="status-badge" id="pending-edits-badge">0 pending</span>
        <p class="muted" style="margin: 0.5rem 0 0.75rem">
          New credentials created on sites you visit — send them to a device you trust to save.
        </p>
        <div class="actions-row">
          <button id="send-to-desktop">Send to this computer</button>
          <button id="send-to-phone">Send to phone</button>
        </div>
        <p id="pending-edits-status" class="muted" style="margin-top: 0.5rem"></p>
      </div>
      <div id="pending-edit-qr-wrapper" hidden>
        <div class="card">
          <p class="muted" style="margin: 0 0 0.5rem">Scan with the TruthID Mobile app.</p>
          <canvas id="pending-edit-qr-canvas"></canvas>
          <button id="pending-edit-retry" style="margin-top: 0.75rem">
            I scanned it — try sending again
          </button>
          <div class="manual-row" style="margin-top: 0.75rem">
            <input
              id="pending-edit-manual-ip"
              type="text"
              placeholder="Phone IP (e.g. 192.168.1.42)"
            />
            <button id="pending-edit-manual-connect">Send</button>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
